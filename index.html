<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenNana Gallery - 正在跳转...</title>
    <meta http-equiv="refresh" content="0; url=public/nano/opennana-framework.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 16px;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin: 10px 15px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎨</div>
        <h1>OpenNana Gallery</h1>
        <p>正在跳转到 Nano Gallery...</p>
        <div class="spinner"></div>
        <p>如果页面没有自动跳转，请点击下方链接：</p>
        <div class="links">
            <a href="public/nano/opennana-framework.html">🎨 Nano Gallery</a>
            <a href="public/gpt/gpt-framework.html">🤖 GPT Gallery</a>
        </div>
    </div>
</body>
</html>
